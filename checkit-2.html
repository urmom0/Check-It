<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink-deep:#2B4A32;
    --ink-deep-2:#3C5D43;
    --ink-deep-3:#1B2E20;
    --paper:#F6EBE0;
    --paper-soft:#FBF6EE;
    --text:#20281F;
    --text-dim:#6C7F68;
    --rule:#D6CBBC;
    --stamp:#8B1B1A;
    --stamp-dark:#601C17;
    --tag:#3E6647;
    --danger:#A83232;
    --radius:16px;
    --font-display:'Space Grotesk', sans-serif;
    --font-body:'Inter', system-ui, -apple-system, sans-serif;
    --font-mono:'IBM Plex Mono', ui-monospace, monospace;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; }
  body{
    margin:0;
    background:var(--ink-deep-3);
    color:var(--text);
    font-family:var(--font-body);
    overscroll-behavior-y:contain;
  }
  button{ font-family:inherit; cursor:pointer; }
  input{ font-family:inherit; }
  :focus-visible{ outline:2px solid var(--stamp); outline-offset:2px; }

  #app{
    max-width:560px;
    margin:0 auto;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    background:var(--paper);
    box-shadow:0 0 60px rgba(0,0,0,0.35);
  }

  /* ---------- header ---------- */
  .chrome{
    background:var(--ink-deep);
    padding:calc(env(safe-area-inset-top, 0px) + 18px) 18px 16px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    position:sticky;
    top:0;
    z-index:20;
  }
  .brand{ display:flex; align-items:center; gap:10px; }
  .brand-mark{
    width:30px; height:30px;
    border-radius:8px;
    background:var(--stamp);
    color:var(--paper);
    display:flex; align-items:center; justify-content:center;
    font-family:var(--font-display); font-weight:700; font-size:16px;
    transform:rotate(-6deg);
    flex-shrink:0;
  }
  .brand h1{
    font-family:var(--font-display);
    font-weight:700;
    font-size:21px;
    color:var(--paper);
    margin:0;
    letter-spacing:0.2px;
  }
  .who{
    background:var(--ink-deep-2);
    border:1px solid rgba(242,239,230,0.18);
    color:var(--paper);
    padding:7px 12px;
    border-radius:999px;
    font-size:13px;
    font-weight:500;
    display:flex; align-items:center; gap:6px;
    max-width:140px;
  }
  .who span{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .who:active{ background:var(--ink-deep-3); }

  /* ---------- tabs ---------- */
  .tabs{
    display:flex;
    align-items:flex-end;
    gap:4px;
    padding:10px 12px 0;
    overflow-x:auto;
    background:var(--ink-deep);
    scrollbar-width:none;
  }
  .tabs::-webkit-scrollbar{ display:none; }
  .tab{
    flex:0 0 auto;
    background:var(--ink-deep-2);
    color:rgba(242,239,230,0.75);
    border:none;
    padding:10px 14px;
    border-radius:10px 10px 0 0;
    font-family:var(--font-display);
    font-weight:600;
    font-size:14px;
    display:flex; align-items:center; gap:8px;
    white-space:nowrap;
  }
  .tab.active{
    background:var(--paper);
    color:var(--text);
  }
  .tab .x{
    font-family:var(--font-body);
    font-weight:400;
    font-size:15px;
    color:inherit;
    opacity:0.45;
    line-height:1;
    padding:2px;
  }
  .tab.active .x:hover{ opacity:0.9; color:var(--danger); }
  .tab-new{
    flex:0 0 auto;
    background:transparent;
    border:1.5px dashed rgba(242,239,230,0.35);
    color:rgba(242,239,230,0.75);
    padding:10px 14px;
    border-radius:10px 10px 0 0;
    font-family:var(--font-display);
    font-weight:600;
    font-size:14px;
    white-space:nowrap;
  }

  /* ---------- board ---------- */
  .board{
    flex:1;
    padding:18px 16px calc(env(safe-area-inset-bottom,0px) + 28px);
    display:flex;
    flex-direction:column;
    min-height:0;
  }
  .list-title{
    font-family:var(--font-display);
    font-size:19px;
    font-weight:600;
    margin:2px 0 14px;
  }

  .add-form{
    display:flex;
    gap:8px;
    margin-bottom:18px;
  }
  .add-form input{
    flex:1;
    background:var(--paper-soft);
    border:1.5px solid var(--rule);
    border-radius:10px;
    padding:12px 14px;
    font-size:15px;
    color:var(--text);
  }
  .add-form input::placeholder{ color:var(--text-dim); }
  .add-form button{
    background:var(--ink-deep);
    color:var(--paper);
    border:none;
    border-radius:10px;
    padding:0 18px;
    font-weight:600;
    font-size:14px;
    font-family:var(--font-display);
  }
  .add-form button:active{ background:var(--ink-deep-3); }
  .add-form button:disabled{ opacity:0.4; }

  ul.items{ list-style:none; margin:0; padding:0; }

  .item{
    display:flex;
    align-items:flex-start;
    gap:12px;
    padding:13px 2px;
    border-bottom:1px solid var(--rule);
    animation:rise 0.18s ease-out;
  }
  @keyframes rise{ from{ opacity:0; transform:translateY(4px);} to{ opacity:1; transform:none; } }

  .check{
    width:26px; height:26px;
    border-radius:7px;
    border:1.5px solid var(--text-dim);
    background:var(--paper-soft);
    flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    color:var(--paper);
    font-size:15px;
    font-weight:700;
    margin-top:1px;
  }
  .item.done .check{
    background:var(--stamp);
    border-color:var(--stamp);
  }

  .item-body{ flex:1; min-width:0; }
  .item-text{
    margin:0;
    font-size:15.5px;
    line-height:1.4;
    word-break:break-word;
  }
  .item.done .item-text{
    text-decoration:line-through;
    color:var(--text-dim);
  }
  .item-meta{
    margin:3px 0 0;
    font-family:var(--font-mono);
    font-size:11.5px;
    color:var(--tag);
    letter-spacing:0.1px;
  }

  .stamp{
    flex-shrink:0;
    background:var(--stamp);
    color:var(--paper);
    border:1.5px solid var(--stamp-dark);
    border-radius:8px;
    padding:5px 8px;
    text-align:center;
    transform:rotate(var(--r,-2deg));
    margin-top:1px;
  }
  .stamp-name{
    display:block;
    font-family:var(--font-display);
    font-weight:700;
    font-size:11.5px;
    letter-spacing:0.5px;
  }
  .stamp-time{
    display:block;
    font-family:var(--font-mono);
    font-size:9px;
    opacity:0.85;
    white-space:nowrap;
    margin-top:1px;
  }

  .remove{
    flex-shrink:0;
    background:none;
    border:none;
    color:var(--text-dim);
    font-size:18px;
    line-height:1;
    padding:4px 2px;
    margin-top:1px;
  }
  .remove:active{ color:var(--danger); }

  .divider{
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--text-dim);
    text-transform:uppercase;
    letter-spacing:0.6px;
    margin:18px 0 4px;
  }

  .empty{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    gap:10px;
    padding:40px 20px;
    color:var(--text-dim);
  }
  .empty h2{
    font-family:var(--font-display);
    color:var(--text);
    font-size:18px;
    margin:0;
  }
  .empty p{ margin:0; font-size:14px; max-width:280px; }
  .empty button{
    margin-top:10px;
    background:var(--ink-deep);
    color:var(--paper);
    border:none;
    border-radius:10px;
    padding:11px 20px;
    font-family:var(--font-display);
    font-weight:600;
    font-size:14px;
  }

  .skeleton{ flex:1; display:flex; align-items:center; justify-content:center; color:var(--text-dim); font-size:14px; }

  /* ---------- modals ---------- */
  .overlay{
    position:fixed; inset:0;
    background:rgba(28,38,31,0.55);
    display:flex; align-items:flex-end; justify-content:center;
    z-index:50;
    padding:16px;
  }
  @media (min-width:480px){ .overlay{ align-items:center; } }
  .overlay[hidden]{ display:none; }
  .modal{
    background:var(--paper);
    border-radius:18px;
    padding:22px;
    width:100%;
    max-width:380px;
    box-shadow:0 20px 50px rgba(0,0,0,0.4);
  }
  .modal h2{
    font-family:var(--font-display);
    font-size:18px;
    margin:0 0 6px;
  }
  .modal p{
    font-size:13.5px;
    color:var(--text-dim);
    margin:0 0 14px;
  }
  .modal input{
    width:100%;
    background:var(--paper-soft);
    border:1.5px solid var(--rule);
    border-radius:10px;
    padding:12px 14px;
    font-size:15px;
    color:var(--text);
    margin-bottom:14px;
  }
  .modal-actions{ display:flex; gap:10px; justify-content:flex-end; }
  .modal button{
    border:none;
    border-radius:10px;
    padding:11px 18px;
    font-family:var(--font-display);
    font-weight:600;
    font-size:14px;
  }
  .modal button.primary{ background:var(--ink-deep); color:var(--paper); }
  .modal button.ghost{ background:transparent; color:var(--text-dim); }
  .modal button:disabled{ opacity:0.4; }

  .toast{
    position:fixed;
    left:50%; bottom:calc(env(safe-area-inset-bottom,0px) + 18px);
    transform:translateX(-50%) translateY(80px);
    background:var(--ink-deep-3);
    color:var(--paper);
    font-size:13px;
    padding:11px 18px;
    border-radius:999px;
    box-shadow:0 8px 24px rgba(0,0,0,0.3);
    z-index:60;
    transition:transform 0.25s ease;
    max-width:90%;
    text-align:center;
  }
  .toast.show{ transform:translateX(-50%) translateY(0); }

  .banner{
    background:#F4E3D3;
    color:#5C3A1E;
    font-size:12.5px;
    line-height:1.4;
    padding:10px 16px;
    border-bottom:1px solid #E0C5A6;
  }
  .banner[hidden]{ display:none; }

  @media (prefers-reduced-motion:reduce){
    .item{ animation:none; }
    .toast{ transition:none; }
  }
</style>
</head>
<body>
  <div id="app">
    <header class="chrome">
      <div class="brand">
        <span class="brand-mark">✓</span>
        <h1>Check It</h1>
      </div>
      <button class="who" id="whoBtn" aria-label="Change your name"><span id="whoLabel">…</span></button>
    </header>

    <nav class="tabs" id="tabs"></nav>

    <div class="banner" id="banner" hidden></div>

    <main class="board" id="board">
      <div class="skeleton">Loading…</div>
    </main>
  </div>

  <div class="overlay" id="nameOverlay" hidden>
    <div class="modal">
      <h2>What should we call you?</h2>
      <p>Your name appears on anything you add or check off, so the group knows who did what.</p>
      <input id="nameInput" type="text" maxlength="24" placeholder="e.g. Sam" autocomplete="given-name">
      <div class="modal-actions">
        <button class="ghost" id="nameCancel" type="button">Cancel</button>
        <button class="primary" id="nameSave" type="button">Save</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="listOverlay" hidden>
    <div class="modal">
      <h2>Name this list</h2>
      <p>Like "Groceries", "Chores", or "Move-in tasks".</p>
      <input id="listInput" type="text" maxlength="40" placeholder="List name">
      <div class="modal-actions">
        <button class="ghost" id="listCancel" type="button">Cancel</button>
        <button class="primary" id="listSave" type="button">Create</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
import {
  getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, getDocs,
  onSnapshot, query, orderBy
} from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";
import {
  getAuth, signInAnonymously, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";

var firebaseConfig = {
  apiKey: "AIzaSyCrHbJj2IHyhvKXC2bdDKG51U7pNWHOf_E",
  authDomain: "check-it-d014c.firebaseapp.com",
  projectId: "check-it-d014c",
  storageBucket: "check-it-d014c.firebasestorage.app",
  messagingSenderId: "306818306006",
  appId: "1:306818306006:web:613063160ae2d00b1ede77"
};

var db = null;
var auth = null;
var firebaseReady = false;
try{
  var fbApp = initializeApp(firebaseConfig);
  db = getFirestore(fbApp, "chrckit");
  auth = getAuth(fbApp);
  firebaseReady = true;
} catch(e){
  console.error("Firebase init failed", e);
}

var state = {
  user: null,
  lists: [],
  currentListId: null,
  items: [],
  unsubLists: null,
  unsubItems: null,
  nameModalForced: false,
  autoOpenedFirstList: false
};

// ---------- local (per-device) preferences ----------
function loadName(){ try{ return localStorage.getItem("checkit-username"); } catch(e){ return null; } }
function saveName(n){ try{ localStorage.setItem("checkit-username", n); } catch(e){} }
function loadLastListId(){ try{ return localStorage.getItem("checkit-last-list"); } catch(e){ return null; } }
function saveLastListId(id){ try{ localStorage.setItem("checkit-last-list", id); } catch(e){} }

// ---------- utils ----------
function escapeHtml(s){
  var d = document.createElement("div");
  d.textContent = s == null ? "" : s;
  return d.innerHTML;
}
function initials(name){
  if(!name) return "?";
  var parts = name.trim().split(/\s+/).filter(Boolean);
  return parts.slice(0,2).map(function(w){ return w[0].toUpperCase(); }).join("");
}
function formatMeta(ts){
  var d = new Date(ts);
  return d.toLocaleString(undefined, { month:"short", day:"numeric", hour:"numeric", minute:"2-digit" });
}
function formatStampDate(ts){
  var d = new Date(ts);
  return d.toLocaleDateString(undefined, { month:"short", day:"numeric" });
}
function formatStampTime(ts){
  var d = new Date(ts);
  return d.toLocaleTimeString(undefined, { hour:"numeric", minute:"2-digit" });
}
function rotFromId(id){
  var h = 0;
  for(var i=0;i<id.length;i++){ h = (h * 31 + id.charCodeAt(i)) | 0; }
  return (Math.abs(h) % 7) - 3;
}
var toastTimer = null;
function showToast(msg){
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ t.classList.remove("show"); }, 3000);
}
function showSyncError(err){
  var banner = document.getElementById("banner");
  banner.hidden = false;
  banner.textContent = "Sync error: " + (err && err.message ? err.message : "couldn't reach the database.") + " Check your Firestore security rules and connection.";
}

// ---------- name modal ----------
function openNameModal(forced){
  state.nameModalForced = !!forced;
  var overlay = document.getElementById("nameOverlay");
  var input = document.getElementById("nameInput");
  input.value = state.user || "";
  document.getElementById("nameCancel").style.display = forced ? "none" : "";
  overlay.hidden = false;
  setTimeout(function(){ input.focus(); }, 50);
}
function closeNameModal(){
  document.getElementById("nameOverlay").hidden = true;
}
function handleSaveName(){
  var input = document.getElementById("nameInput");
  var val = input.value.trim();
  if(!val) { input.focus(); return; }
  saveName(val);
  state.user = val;
  updateWhoLabel();
  closeNameModal();
  if(firebaseReady && state.lists.length === 0 && !state.autoOpenedFirstList){
    state.autoOpenedFirstList = true;
    openListModal();
  }
}
function updateWhoLabel(){
  document.getElementById("whoLabel").textContent = state.user || "Set name";
}

// ---------- list modal ----------
function openListModal(){
  var overlay = document.getElementById("listOverlay");
  var input = document.getElementById("listInput");
  input.value = "";
  overlay.hidden = false;
  setTimeout(function(){ input.focus(); }, 50);
}
function closeListModal(){
  document.getElementById("listOverlay").hidden = true;
}
async function handleCreateList(){
  var input = document.getElementById("listInput");
  var name = input.value.trim();
  if(!name) { input.focus(); return; }
  closeListModal();
  try{
    var docRef = await addDoc(collection(db, "lists"), {
      name: name,
      createdAt: Date.now(),
      createdBy: state.user
    });
    selectList(docRef.id, false);
  } catch(e){
    console.error(e);
    showToast("Couldn't create list: " + e.message);
  }
}
async function handleDeleteList(id, evt){
  if(evt) evt.stopPropagation();
  var list = state.lists.find(function(l){ return l.id === id; });
  if(!list) return;
  if(!confirm('Delete the list "' + list.name + '"? This removes everything on it for everyone.')) return;
  try{
    var itemsSnap = await getDocs(collection(db, "lists", id, "items"));
    var deletions = [];
    itemsSnap.forEach(function(d){ deletions.push(deleteDoc(d.ref)); });
    await Promise.all(deletions);
    await deleteDoc(doc(db, "lists", id));
  } catch(e){
    console.error(e);
    showToast("Couldn't delete list: " + e.message);
  }
}

// ---------- tabs ----------
function renderTabs(){
  var tabs = document.getElementById("tabs");
  var prevScroll = tabs.scrollLeft;
  var html = "";
  state.lists.forEach(function(l){
    var active = l.id === state.currentListId;
    html += '<button class="tab' + (active ? " active" : "") + '" data-id="' + l.id + '">' +
              '<span>' + escapeHtml(l.name) + '</span>' +
              (active ? '<span class="x" data-del="' + l.id + '">×</span>' : '') +
            '</button>';
  });
  html += '<button class="tab-new" id="newListBtn">+ List</button>';
  tabs.innerHTML = html;
  tabs.scrollLeft = prevScroll;

  Array.prototype.forEach.call(tabs.querySelectorAll(".tab"), function(btn){
    btn.addEventListener("click", function(e){
      var del = e.target.getAttribute("data-del");
      if(del){ handleDeleteList(del, e); return; }
      selectList(btn.getAttribute("data-id"));
    });
  });
  document.getElementById("newListBtn").addEventListener("click", openListModal);
}

// ---------- board ----------
function renderEmptyBoard(){
  var board = document.getElementById("board");
  board.innerHTML =
    '<div class="empty">' +
      '<h2>No lists yet</h2>' +
      '<p>Start one for groceries, chores, a project — anything the group needs to track together.</p>' +
      '<button id="emptyNewList">Create a list</button>' +
    '</div>';
  document.getElementById("emptyNewList").addEventListener("click", openListModal);
}

function renderBoardShell(list){
  var board = document.getElementById("board");
  board.innerHTML =
    '<h2 class="list-title">' + escapeHtml(list.name || "") + '</h2>' +
    '<div class="add-form" id="addForm">' +
      '<input id="itemInput" type="text" maxlength="120" placeholder="Add an item…" autocomplete="off">' +
      '<button type="button" id="addBtn">Add</button>' +
    '</div>' +
    '<ul class="items" id="itemsList"><div class="skeleton">Loading…</div></ul>';

  document.getElementById("addBtn").addEventListener("click", function(){
    handleAddItem();
  });
  document.getElementById("itemInput").addEventListener("keydown", function(e){
    if(e.key === "Enter"){ handleAddItem(); }
  });
}

function renderItemList(){
  var ul = document.getElementById("itemsList");
  if(!ul) return;
  if(!state.items.length){
    ul.innerHTML = '<div class="empty" style="padding:30px 4px;"><p>Nothing here yet — add the first thing to do.</p></div>';
    return;
  }
  var pending = state.items.filter(function(i){ return !i.completed; })
    .sort(function(a,b){ return a.addedAt - b.addedAt; });
  var done = state.items.filter(function(i){ return i.completed; })
    .sort(function(a,b){ return (b.completedAt||0) - (a.completedAt||0); });

  var html = "";
  pending.forEach(function(it){ html += itemRow(it); });
  if(done.length){
    html += '<div class="divider">Completed (' + done.length + ')</div>';
    done.forEach(function(it){ html += itemRow(it); });
  }
  ul.innerHTML = html;

  Array.prototype.forEach.call(ul.querySelectorAll(".check"), function(btn){
    btn.addEventListener("click", function(){ handleToggle(btn.getAttribute("data-id")); });
  });
  Array.prototype.forEach.call(ul.querySelectorAll(".remove"), function(btn){
    btn.addEventListener("click", function(){ handleDeleteItem(btn.getAttribute("data-id")); });
  });
}

function itemRow(it){
  var doneClass = it.completed ? " done" : "";
  var checkMark = it.completed ? "✓" : "";
  var meta = it.completed
    ? ""
    : '<p class="item-meta">added by ' + escapeHtml(it.addedBy || "someone") + ' · ' + formatMeta(it.addedAt) + '</p>';
  var stamp = it.completed
    ? '<div class="stamp" style="--r:' + rotFromId(it.id) + 'deg">' +
        '<span class="stamp-name">' + escapeHtml(initials(it.completedBy)) + '</span>' +
        '<span class="stamp-time">' + formatStampDate(it.completedAt) + ' · ' + formatStampTime(it.completedAt) + '</span>' +
      '</div>'
    : "";
  return (
    '<li class="item' + doneClass + '" data-id="' + it.id + '">' +
      '<button class="check" data-id="' + it.id + '" aria-label="' + (it.completed ? "Mark not done" : "Mark done") + '">' + checkMark + '</button>' +
      '<div class="item-body">' +
        '<p class="item-text">' + escapeHtml(it.text) + '</p>' +
        meta +
      '</div>' +
      stamp +
      '<button class="remove" data-id="' + it.id + '" aria-label="Delete item">×</button>' +
    '</li>'
  );
}

// ---------- realtime subscriptions ----------
function subscribeLists(){
  var listsRef = query(collection(db, "lists"), orderBy("createdAt", "asc"));
  state.unsubLists = onSnapshot(listsRef, function(snapshot){
    state.lists = snapshot.docs.map(function(d){
      var data = d.data();
      return { id: d.id, name: data.name, createdAt: data.createdAt, createdBy: data.createdBy };
    });
    renderTabs();

    var current = state.lists.find(function(l){ return l.id === state.currentListId; });
    if(current){
      var titleEl = document.querySelector(".list-title");
      if(titleEl) titleEl.textContent = current.name;
      return;
    }

    if(state.lists.length){
      var lastId = loadLastListId();
      var startId = (lastId && state.lists.find(function(l){ return l.id === lastId; })) ? lastId : state.lists[0].id;
      selectList(startId, true);
    } else {
      state.currentListId = null;
      renderEmptyBoard();
      if(state.user && !state.autoOpenedFirstList){
        state.autoOpenedFirstList = true;
        openListModal();
      }
    }
  }, function(err){
    console.error("lists subscription error", err);
    showSyncError(err);
  });
}

function subscribeItems(listId){
  if(state.unsubItems){ state.unsubItems(); state.unsubItems = null; }
  var itemsRef = query(collection(db, "lists", listId, "items"), orderBy("addedAt", "asc"));
  state.unsubItems = onSnapshot(itemsRef, function(snapshot){
    state.items = snapshot.docs.map(function(d){
      return Object.assign({ id: d.id }, d.data());
    });
    renderItemList();
  }, function(err){
    console.error("items subscription error", err);
    showSyncError(err);
  });
}

function selectList(id, skipSave){
  state.currentListId = id;
  var list = state.lists.find(function(l){ return l.id === id; }) || { id:id, name:"" };
  renderTabs();
  renderBoardShell(list);
  subscribeItems(id);
  if(!skipSave) saveLastListId(id);
}

// ---------- item actions ----------
async function handleAddItem(){
  var input = document.getElementById("itemInput");
  var text = input.value.trim();
  if(!text) return;
  if(!ensureName()) return;
  input.value = "";
  try{
    await addDoc(collection(db, "lists", state.currentListId, "items"), {
      text: text,
      completed: false,
      addedBy: state.user,
      addedAt: Date.now(),
      completedBy: null,
      completedAt: null
    });
  } catch(e){
    console.error(e);
    showToast("Couldn't add item: " + e.message);
  }
  input.focus();
}

async function handleToggle(id){
  if(!ensureName()) return;
  var it = state.items.find(function(i){ return i.id === id; });
  if(!it) return;
  try{
    var ref = doc(db, "lists", state.currentListId, "items", id);
    if(it.completed){
      await updateDoc(ref, { completed:false, completedBy:null, completedAt:null });
    } else {
      await updateDoc(ref, { completed:true, completedBy: state.user, completedAt: Date.now() });
    }
  } catch(e){
    console.error(e);
    showToast("Couldn't update item: " + e.message);
  }
}

async function handleDeleteItem(id){
  try{
    await deleteDoc(doc(db, "lists", state.currentListId, "items", id));
  } catch(e){
    console.error(e);
    showToast("Couldn't delete item: " + e.message);
  }
}

function ensureName(){
  if(state.user) return true;
  openNameModal(true);
  return false;
}

// ---------- init ----------
function init(){
  document.getElementById("whoBtn").addEventListener("click", function(){ openNameModal(false); });
  document.getElementById("nameSave").addEventListener("click", handleSaveName);
  document.getElementById("nameCancel").addEventListener("click", closeNameModal);
  document.getElementById("nameInput").addEventListener("keydown", function(e){ if(e.key === "Enter") handleSaveName(); });

  document.getElementById("listSave").addEventListener("click", handleCreateList);
  document.getElementById("listCancel").addEventListener("click", closeListModal);
  document.getElementById("listInput").addEventListener("keydown", function(e){ if(e.key === "Enter") handleCreateList(); });

  state.user = loadName();
  updateWhoLabel();
  if(!state.user) openNameModal(true);

  if(!firebaseReady){
    var banner = document.getElementById("banner");
    banner.hidden = false;
    banner.textContent = "Couldn't connect to the database. Check the Firebase config in the page source.";
    document.getElementById("board").innerHTML = '<div class="empty"><p>Sync is unavailable right now.</p></div>';
    return;
  }

  var subscribed = false;
  onAuthStateChanged(auth, function(user){
    if(user && !subscribed){
      subscribed = true;
      subscribeLists();
    }
  });
  signInAnonymously(auth).catch(function(e){
    console.error("Anonymous sign-in failed", e);
    var banner = document.getElementById("banner");
    banner.hidden = false;
    if(e && e.code === "auth/admin-restricted-operation" || e && e.code === "auth/operation-not-allowed"){
      banner.textContent = "Sign-in is blocked: enable Anonymous authentication in Firebase Console under Build → Authentication → Sign-in method.";
    } else {
      banner.textContent = "Couldn't sign in: " + (e && e.message ? e.message : "unknown error") + ".";
    }
    document.getElementById("board").innerHTML = '<div class="empty"><p>Sync is unavailable right now.</p></div>';
  });
}

init();
</script>
</body>
</html>
